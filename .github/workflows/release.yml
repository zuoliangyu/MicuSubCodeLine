name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: micusubcodeline-linux-x64.tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: micusubcodeline-linux-x64-static.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: micusubcodeline-windows-x64.zip
          - target: x86_64-apple-darwin
            os: macos-latest
            name: micusubcodeline-macos-x64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: micusubcodeline-macos-arm64.tar.gz

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: release-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install musl tools
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Build binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package Linux/macOS
      if: runner.os != 'Windows'
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/micusubcodeline dist/micusubcodeline
        cd dist
        tar czf ../${{ matrix.name }} micusubcodeline

    - name: Package Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist
        Copy-Item "target\${{ matrix.target }}\release\micusubcodeline.exe" "dist\micusubcodeline.exe"
        Compress-Archive -Path "dist\micusubcodeline.exe" -DestinationPath "${{ matrix.name }}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: ${{ matrix.name }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Generate Release Notes
      uses: orhun/git-cliff-action@v4
      id: git-cliff
      with:
        config: cliff.toml
        args: --latest --strip header
      env:
        OUTPUT: RELEASE_NOTES.md

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*/*
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false

    - name: Setup Node.js for NPM
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        registry-url: 'https://registry.npmjs.org'

    - name: Extract binaries from archives
      run: |
        mkdir -p extracted

        # macOS x64
        tar -xzf artifacts/micusubcodeline-macos-x64.tar.gz/micusubcodeline-macos-x64.tar.gz -C extracted
        mv extracted/micusubcodeline extracted/micusubcodeline-darwin-x64

        # macOS ARM64
        tar -xzf artifacts/micusubcodeline-macos-arm64.tar.gz/micusubcodeline-macos-arm64.tar.gz -C extracted
        mv extracted/micusubcodeline extracted/micusubcodeline-darwin-arm64

        # Linux x64
        tar -xzf artifacts/micusubcodeline-linux-x64.tar.gz/micusubcodeline-linux-x64.tar.gz -C extracted
        mv extracted/micusubcodeline extracted/micusubcodeline-linux-x64

        # Linux musl (static)
        tar -xzf artifacts/micusubcodeline-linux-x64-static.tar.gz/micusubcodeline-linux-x64-static.tar.gz -C extracted
        mv extracted/micusubcodeline extracted/micusubcodeline-linux-x64-musl

        # Windows
        unzip artifacts/micusubcodeline-windows-x64.zip/micusubcodeline-windows-x64.zip -d extracted
        mv extracted/micusubcodeline.exe extracted/micusubcodeline-win32-x64.exe

        ls -la extracted/

    - name: Prepare NPM packages
      run: |
        node npm/scripts/prepare-packages.js

        cp extracted/micusubcodeline-darwin-x64 npm-publish/darwin-x64/micusubcodeline
        cp extracted/micusubcodeline-darwin-arm64 npm-publish/darwin-arm64/micusubcodeline
        cp extracted/micusubcodeline-linux-x64 npm-publish/linux-x64/micusubcodeline
        cp extracted/micusubcodeline-linux-x64-musl npm-publish/linux-x64-musl/micusubcodeline
        cp extracted/micusubcodeline-win32-x64.exe npm-publish/win32-x64/micusubcodeline.exe

        chmod +x npm-publish/darwin-x64/micusubcodeline
        chmod +x npm-publish/darwin-arm64/micusubcodeline
        chmod +x npm-publish/linux-x64/micusubcodeline
        chmod +x npm-publish/linux-x64-musl/micusubcodeline

        echo "Package structure:"
        find npm-publish -name "package.json" -exec echo "=== {} ===" \; -exec head -5 {} \;

    - name: Publish platform packages to NPM
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        for platform in darwin-x64 darwin-arm64 linux-x64 linux-x64-musl win32-x64; do
          echo "📦 Publishing @zuolan/micusubcodeline-$platform"
          cd npm-publish/$platform
          npm publish --access public
          cd ../..
          echo "✅ Published @zuolan/micusubcodeline-$platform"
        done

    - name: Wait for NPM registry
      run: |
        echo "⏳ Waiting for platform packages to be available on NPM..."
        sleep 30

    - name: Publish main package to NPM
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        cd npm-publish/main
        echo "📦 Publishing @zuolan/micusubcodeline"
        npm publish --access public
        echo "✅ Published @zuolan/micusubcodeline"
        echo ""
        echo "🎉 NPM packages published successfully!"
        echo "Install with: npm install -g @zuolan/micusubcodeline"
